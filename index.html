<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アシスト競輪 V3.1 - yottiエディション</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 980px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2d5a27; border-bottom: 3px solid #28a745; padding-bottom: 10px; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { border: 1px solid #dee2e6; padding: 12px 8px; text-align: center; }
        th { background-color: #f1f8f1; color: #495057; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 15px; background-color: #fff; }
        .score-cell { font-weight: bold; color: #e44d26; font-size: 1.2em; background-color: #fff9f8; }
        .btn-calc { width: 100%; padding: 18px; margin-top: 25px; background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; font-weight: bold; }
        b { color: #218838; }
    </style>
</head>
<body onpaste="handlePaste(event)">

<div class="container">
    <h2>アシスト競輪：データ更新・予想算出</h2>
    <table id="keirin-table">
        <thead>
            <tr>
                <th style="width: 8%;">車番</th>
                <th style="width: 28%;">選手名</th>
                <th style="width: 12%;">脚質</th>
                <th style="width: 18%;">競走得点</th>
                <th style="width: 12%;">勝率</th>
                <th style="width: 22%;">予想スコア</th>
            </tr>
        </thead>
        <tbody>
            <script>
                for (let i = 1; i <= 9; i++) {
                    document.write(`
                        <tr>
                            <td><b>${i}</b></td>
                            <td><input type="text" class="p-name" placeholder="選手${i}"></td>
                            <td>
                                <select class="p-style" onchange="calculateScore()">
                                    <option value="">選択</option>
                                    <option value="逃">逃</option><option value="両">両</option><option value="追">追</option>
                                </select>
                            </td>
                            <td><input type="number" step="0.01" value="0" class="p-point" oninput="calculateScore()"></td>
                            <td><input type="number" value="0" class="p-win" oninput="calculateScore()"></td>
                            <td class="score-cell" id="score-${i}">-</td>
                        </tr>
                    `);
                }
            </script>
        </tbody>
    </table>
    <button class="btn-calc" onclick="calculateScore()">予想スコアを算出</button>
</div>

<script>
function calculateScore() {
    const rows = document.querySelectorAll('#keirin-table tbody tr');
    rows.forEach((row, i) => {
        const p = parseFloat(row.querySelector('.p-point').value) || 0;
        const w = parseFloat(row.querySelector('.p-win').value) || 0;
        const s = p + (w * 0.5);
        document.getElementById(`score-${i+1}`).innerText = p > 0 ? s.toFixed(2) : "-";
    });
}

function handlePaste(e) {
    const data = (e.clipboardData || window.clipboardData).getData('text');
    const tableRows = document.querySelectorAll('#keirin-table tbody tr');
    
    // 改行と空白ですべての塊に分解
    const items = data.split(/\s+/).filter(it => it.trim() !== "");
    let rowIndex = 0;

    for (let i = 0; i < items.length; i++) {
        if (rowIndex >= 9) break;

        // 「脚質（/逃、/追、/両）」が含まれる項目を探す
        if (items[i].includes('/') && /[逃両追]/.test(items[i])) {
            const ins = tableRows[rowIndex].querySelectorAll('input, select');
            
            // 1. 脚質を決定
            const styleChar = items[i].split('/').pop().charAt(0);
            Array.from(ins[1].options).forEach((opt, idx) => {
                if (opt.value === styleChar) ins[1].selectedIndex = idx;
            });

            // 2. 選手名を決定（重要：都道府県のさらに前にある、純粋な漢字の塊を探す）
            // 画像4の構造： [名前] [名前] [(追加)] [都道府県]/[級班]/[脚質]
            let nameParts = [];
            for (let j = i - 1; j >= 0; j--) {
                // スラッシュを含まず、数字でもない、2文字以上の漢字やカナの塊を名前のパーツとする
                if (!items[j].includes('/') && isNaN(items[j]) && items[j].length >= 2) {
                    // 「神奈川」などの都道府県を除外するため、名前に含まれがちな「(追加)」などは無視してさらに遡る
                    if (!items[j].includes('(')) {
                        nameParts.unshift(items[j]);
                    }
                }
                // 名前は大抵2項目（姓・名）なので、2つ見つかったら止める。あるいは車番（数字）にぶつかったら止める
                if (nameParts.length >= 2 || (j > 0 && !isNaN(items[j-1]))) break;
            }
            // 最後に都道府県（名標の直前の項目）を除去してセット
            if (nameParts.length > 1) nameParts.pop(); 
            ins[0].value = nameParts.join(' ');

            // 3. 競走得点と勝率（脚質より後の数字を順番に拾う）
            let nums = [];
            for (let k = i + 1; k < i + 15 && k < items.length; k++) {
                if (!isNaN(items[k])) nums.push(items[k]);
            }

            const scoreVal = nums.find(n => n.includes('.')) || nums.find(n => parseFloat(n) > 60);
            if (scoreVal) {
                ins[2].value = parseFloat(scoreVal).toFixed(2);
                const sIdx = nums.indexOf(scoreVal);
                const winVal = nums.slice(sIdx + 1).find(n => parseFloat(n) <= 100);
                if (winVal) ins[3].value = winVal;
            }

            rowIndex++;
        }
    }

    setTimeout(calculateScore, 100);
    e.preventDefault();
}
</script>
</body>
</html>
