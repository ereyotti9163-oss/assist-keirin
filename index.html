<div class="hint-box">
    <p class="hint-text">
        <strong>【使い方】</strong> keirin.jpの出走表をコピーして、この画面上のどこでも「貼り付け（Ctrl+V）」してください。<br>
        ①選手名の末尾（出身地）を自動除去、②競走得点（小数点）を起点に勝率を正確に抽出、③数値入力でリアルタイム計算。
    </p>
</div>

<table id="race-table">
    <thead>
        <tr>
            <th style="width: 7%;">車番</th>
            <th style="width: 25%;">選手名</th>
            <th style="width: 13%;">脚質</th>
            <th style="width: 18%;">競走得点</th>
            <th style="width: 15%;">勝率(1着率)</th>
            <th style="width: 22%;">予想スコア</th>
        </tr>
    </thead>
    <tbody>
        <script>
            for (let i = 1; i <= 9; i++) {
                document.write(`
                    <tr id="row-${i}">
                        <td><b style="font-size:1.2em;">${i}</b></td>
                        <td>
                            <input type="text" class="p-name" placeholder="選手名">
                        </td>
                        <td>
                            <select class="p-style" onchange="doCalc()">
                                <option value="">-</option>
                                <option value="逃">逃</option><option value="両">両</option><option value="追">追</option>
                            </select>
                        </td>
                        <td><input type="number" step="0.01" class="p-point" oninput="doCalc()" placeholder="0.00"></td>
                        <td><input type="number" step="0.1" class="p-win" oninput="doCalc()" placeholder="0.0"></td>
                        <td class="res-cell" id="score-${i}">-</td>
                    </tr>
                `);
            }
        </script>
    </tbody>
</table>

<div style="text-align:right;">
    <button class="btn-clear" onclick="location.reload()">全てのデータをリセット</button>
</div>
