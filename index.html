<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アシストマジック - 決定版</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a2a6c; border-bottom: 2px solid #1a2a6c; padding-bottom: 10px; }
        .ranking-box { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .rank-value { font-size: 2.2em; font-weight: bold; color: #f1c40f; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1a2a6c; color: white; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1.1em; }
        .score-cell { font-size: 1.2em; font-weight: bold; color: #e74c3c; background: #fffafa; }
    </style>
</head>
<body>
<div class="container">
    <h1>アシストマジック</h1>
    <div class="ranking-box">
        <div id="top1" class="rank-value">-</div>
        <div id="top2" class="rank-value">-</div>
        <div id="top3" class="rank-value">-</div>
    </div>
    <table>
        <thead><tr><th>車</th><th>競走得点</th><th>勝率</th><th>スコア</th></tr></thead>
        <tbody id="member-list"></tbody>
    </table>
</div>
<script>
    const tbody = document.getElementById('member-list');
    for (let i = 1; i <= 9; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><b>${i}</b></td>
            <td><input type="number" step="0.01" id="point-${i}" oninput="updateAll()"></td>
            <td><input type="number" id="win-${i}" oninput="updateAll()"></td>
            <td id="score-${i}" class="score-cell">0.00</td>`;
        tbody.appendChild(tr);
    }

    document.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = e.clipboardData.getData('text');
        const matches = text.match(/\d+\.\d+|\d+/g);
        if (!matches) return;

        let pointsPos = [];
        for (let i = 0; i < matches.length; i++) {
            if (matches[i].includes('.')) pointsPos.push(i);
        }

        pointsPos.forEach((pos, index) => {
            const pIdx = index + 1;
            if (pIdx > 9) return;
            
            document.getElementById(`point-${pIdx}`).value = parseFloat(matches[pos]).toFixed(2);

            let limit = pointsPos[index + 1] || matches.length;
            let sub = matches.slice(pos + 1, limit).filter(v => !v.includes('.'));
            
            if (sub.length >= 3) {
                // 今まで通り、後ろから3番目を自動で入れる（一番下で22が出るのもそのまま）
                document.getElementById(`win-${pIdx}`).value = sub[sub.length - 3];
            }
            updateScore(pIdx);
        });
        updateRanking();
    });

    function updateAll() { for(let i=1; i<=9; i++) updateScore(i); updateRanking(); }
    function updateScore(idx) {
        const p = parseFloat(document.getElementById(`point-${idx}`).value) || 0;
        const w = parseFloat(document.getElementById(`win-${idx}`).value) || 0;
        document.getElementById(`score-${idx}`).innerText = (p + (w * 0.5)).toFixed(2);
    }
    function updateRanking() {
        let res = [];
        for (let i = 1; i <= 9; i++) {
            const sc = parseFloat(document.getElementById(`score-${i}`).innerText);
            if (sc > 0) res.push({ num: i, score: sc });
        }
        res.sort((a, b) => b.score - a.score);
        for (let i = 1; i <= 3; i++) {
            document.getElementById(`top${i}`).innerText = res[i - 1] ? res[i - 1].num : "-";
        }
    }
</script>
</body>
</html>
