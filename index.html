<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アシスト競輪 V3 (検証版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 15px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #2c3e50; font-size: 1.2rem; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        .input-area { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 14px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
        button { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        #output { margin-top: 20px; }
        .result-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
        .rank-1 { color: #e74c3c; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>アシスト競輪 V3</h1>
    
    <div class="input-area">
        <label>バンク特性を選択</label>
        <select id="bankType">
            <option value="1.0">通常 (400m/500m)</option>
            <option value="1.2">333m (先行・番手有利)</option>
        </select>
    </div>

    <div class="input-area">
        <label>レースデータ貼り付け</label>
        <textarea id="rawData" rows="8" placeholder="ここにデータをペーストしてください"></textarea>
    </div>

    <button onclick="analyzeRace()">分析実行</button>

    <div id="output"></div>
</div>

<script>
function analyzeRace() {
    const data = document.getElementById('rawData').value;
    const bankBonus = parseFloat(document.getElementById('bankType').value);
    const output = document.getElementById('output');
    
    if(!data) {
        alert("データを入力してください");
        return;
    }

    // --- ここに解析ロジックを記述 ---
    // yottiさんの現在のパース処理をここに移植します
    // 以下は「番手補正」を加えたサンプルロジックです
    
    let lines = data.split('\n');
    let results = [];

    // 仮の簡易解析ループ
    lines.forEach((line, index) => {
        if(line.trim() === "") return;
        
        // 仮のスコア抽出（yottiさんの既存コードに合わせて調整が必要）
        let baseScore = Math.random() * 20 + 80; 
        
        // 【新ロジック】番手ならスコアアップ
        // もしデータ内に「逃」や「番」の文字があれば判定
        let finalScore = baseScore;
        if(line.includes("番")) {
            finalScore *= 1.05; // 番手なら5%加点
        }
        
        // 【新ロジック】333バンクなら先行・番手をさらに強化
        if(bankBonus > 1.0 && (line.includes("逃") || line.includes("番"))) {
            finalScore *= bankBonus;
        }

        results.push({car: index + 1, score: finalScore.toFixed(2)});
    });

    // スコア順にソート
    results.sort((a, b) => b.score - a.score);

    // 結果表示
    let html = "<strong>【分析順位】</strong>";
    results.forEach((r, i) => {
        let rankClass = (i === 0) ? "rank-1" : "";
        html += `<div class="result-row ${rankClass}"><span>${i+1}位: ${r.car}番車</span><span>${r.score}</span></div>`;
    });
    
    output.innerHTML = html;
}
</script>

</body>
</html>
