<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アシスト競輪予想 V1</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th { background-color: #f8f9fa; }
        input, select {
            width: 90%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-calc {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-calc:hover { background-color: #219150; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            border-left: 5px solid var(--accent-color);
        }
        .rank-1 { color: #d35400; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>アシスト競輪予想 V1</h1>
    
    <div class="setup-section">
        <div>
            <label>バンクタイプ:</label>
            <select id="bank-type">
                <option value="333">333m (先行有利)</option>
                <option value="400" selected>400m (標準)</option>
                <option value="500">500m (追い込み有利)</option>
            </select>
        </div>
        <div>
            <label>ライン構成 (例: 123-45-6789):</label>
            <input type="text" id="line-info" placeholder="123-45-6789">
        </div>
    </div>

    <table id="runner-table">
        <thead>
            <tr>
                <th>車番</th>
                <th>選手名</th>
                <th>脚質</th>
                <th>直近勝率(%)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <button class="btn-calc" onclick="calculateForecast()">予想スコアを算出</button>

    <div id="result" style="display:none;">
        <h2>予想結果 (期待値スコア)</h2>
        <div id="result-content"></div>
    </div>
</div>

<script>
    // 9車立ての入力欄を自動生成
    const tbody = document.querySelector('#runner-table tbody');
    for (let i = 1; i <= 9; i++) {
        tbody.innerHTML += `
            <tr>
                <td>${i}</td>
                <td><input type="text" id="name-${i}" placeholder="選手${i}"></td>
                <td>
                    <select id="style-${i}">
                        <option value="逃">逃げ</option>
                        <option value="両">両</option>
                        <option value="追">追込み</option>
                    </select>
                </td>
                <td><input type="number" id="winrate-${i}" value="10"></td>
            </tr>
        `;
    }

    function calculateForecast() {
        const bank = document.getElementById('bank-type').value;
        const lineStr = document.getElementById('line-info').value;
        let scores = [];

        for (let i = 1; i <= 9; i++) {
            let baseScore = parseFloat(document.getElementById(`winrate-${i}`).value) || 0;
            let style = document.getElementById(`style-${style}`).value; // 修正箇所あり

            // バンクと脚質の相性ロジック
            if (bank === "333" && style === "逃") baseScore *= 1.2;
            if (bank === "500" && style === "追") baseScore *= 1.2;

            // ライン位置の簡易判定（先頭か番手かなど）
            // ここでは簡易的に勝率ベースでスコア化
            scores.push({ num: i, name: document.getElementById(`name-${i}`).value || `選手${i}`, score: baseScore });
        }

        // スコア順に並び替え
        scores.sort((a, b) => b.score - a.score);

        const resultContent = document.getElementById('result-content');
        resultContent.innerHTML = "<ol>" + scores.slice(0, 5).map((s, idx) => 
            `<li class="rank-${idx+1}">${s.num}番車 ${s.name} (スコア: ${s.score.toFixed(1)})</li>`
        ).join('') + "</ol>";
        
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
