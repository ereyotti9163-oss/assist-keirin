<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アシスト競輪アップデート</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f8f9fa; }
        input, select { width: 90%; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .header-title { font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<span class="header-title">アシスト競輪：初期画面</span>
<table id="keirin-table">
    <thead>
        <tr>
            <th>車番</th>
            <th>選手名</th>
            <th>脚質</th>
            <th>競走得点</th>
            <th>勝率(%)</th>
        </tr>
    </thead>
    <tbody>
        <script>
            for (let i = 1; i <= 9; i++) {
                document.write(`
                    <tr>
                        <td><b>${i}</b></td>
                        <td><input type="text" placeholder="選手${i}"></td>
                        <td>
                            <select>
                                <option value="">選択</option>
                                <option value="逃">逃</option>
                                <option value="両">両</option>
                                <option value="追">追</option>
                            </select>
                        </td>
                        <td><input type="number" step="0.01" value="0"></td>
                        <td><input type="number" value="0"></td>
                    </tr>
                `);
            }
        </script>
    </tbody>
</table>

<script>
document.addEventListener('paste', (event) => {
    // クリップボードからテキストを取得
    const pasteData = (event.clipboardData || window.clipboardData).getData('text');
    
    // 行ごとに分割（実際のデータに合わせて解析）
    // 選手名、得点などが混ざった塊を正規表現で各車番に分ける
    const rows = pasteData.trim().split(/\s+(?=\d\s+[^\d])/); 
    // ※「数字 + スペース + 漢字」が出現する場所を車番の区切りとみなす
    
    const tableRows = document.querySelectorAll('#keirin-table tbody tr');

    rows.forEach((rowText, index) => {
        if (index >= 9) return;

        const tableRow = tableRows[index];
        const inputs = tableRow.querySelectorAll('input, select');

        // スペースで細かく分割
        // 例: ["将人", "福", "島/A1A1/追", "87.04", "0", "0", "5", "3", "0"]
        const items = rowText.trim().split(/\s+/);

        // データの並び順に基づいて流し込み
        if (items.length >= 4) {
            // 1. 選手名 (苗字と名前を結合)
            // もし先頭に車番の数字が混じっていたら除外して結合
            let nameStart = isNaN(items[0]) ? 0 : 1;
            inputs[0].value = items[nameStart] + (items[nameStart + 1] ? ' ' + items[nameStart + 1] : '');

            // 2. 脚質 (「島/A1A1/追」のような文字列から最後の1文字を抽出)
            const detailInfo = items.find(item => item.includes('/'));
            if (detailInfo) {
                const styleChar = detailInfo.slice(-1);
                const select = inputs[1];
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].text === styleChar) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }

            // 3. 競走得点 (小数点を含む数値を探す)
            const score = items.find(item => item.includes('.'));
            if (score) inputs[2].value = score;

            // 4. 勝率 (一番最後の数値を勝率として入れる)
            const lastVal = items[items.length - 1];
            if (!isNaN(lastVal)) inputs[3].value = lastVal;
        }
    });

    // 貼り付け後、デフォルトの挙動（文字が入力欄にそのまま出るの）を防ぐ
    event.preventDefault();
});
</script>

</body>
</html>
