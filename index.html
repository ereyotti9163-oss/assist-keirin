<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アシストマジック 競輪予想 V1</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
        }
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--primary-color);
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }
        .setup-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th { background-color: #f8f9fa; }
        input, select {
            width: 90%;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-calc {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-calc:hover { background-color: #219150; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #fff;
            border: 2px solid var(--accent-color);
        }
        .rank-1 { color: #e74c3c; font-weight: bold; font-size: 1.2em; }
        .rank-2 { color: #e67e22; font-weight: bold; }
        .rank-3 { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>アシストマジック 競輪予想 V1</h1>
    
    <div class="setup-section">
        <div>
            <label><strong>バンクタイプ:</strong></label>
            <select id="bank-type">
                <option value="333">333m (先行有利)</option>
                <option value="400" selected>400m (標準)</option>
                <option value="500">500m (追い込み有利)</option>
            </select>
        </div>
        <div>
            <label><strong>ライン構成 (例: 123-45-6789):</strong></label>
            <input type="text" id="line-info" placeholder="123-45-6789">
        </div>
    </div>

    <table id="runner-table">
        <thead>
            <tr>
                <th>車番</th>
                <th>選手名</th>
                <th>脚質</th>
                <th>競走得点</th>
                <th>勝率(%)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <button class="btn-calc" onclick="calculateForecast()">予想スコアを算出</button>

    <div id="result" style="display:none;">
        <h2>予想結果 (推奨買い目)</h2>
        <div id="result-content"></div>
    </div>
</div>

<script>
    // 9車立ての入力欄を自動生成
    const tbody = document.querySelector('#runner-table tbody');
    for (let i = 1; i <= 9; i++) {
        tbody.innerHTML += `
            <tr>
                <td><strong>${i}</strong></td>
                <td><input type="text" id="name-${i}" placeholder="選手${i}"></td>
                <td>
                    <select id="style-${i}">
                        <option value="逃">逃</option>
                        <option value="両" selected>両</option>
                        <option value="追">追</option>
                    </select>
                </td>
                <td><input type="number" id="score-${i}" value="70.0" step="0.1"></td>
                <td><input type="number" id="winrate-${i}" value="10" step="0.1"></td>
            </tr>
        `;
    }

    function calculateForecast() {
        const bank = document.getElementById('bank-type').value;
        const lineStr = document.getElementById('line-info').value;
        let scores = [];

        // ライン位置の解析
        const lines = lineStr.split('-');
        let runnerRoles = {}; // 車番ごとの役割補正
        lines.forEach(line => {
            const runners = line.split('');
            runners.forEach((num, index) => {
                if (index === 0) runnerRoles[num] = 1.05; // 先頭補正
                else if (index === 1) runnerRoles[num] = 1.1; // 番手補正（最も有利とされる）
                else runnerRoles[num] = 1.0;
            });
        });

        for (let i = 1; i <= 9; i++) {
            let rating = parseFloat(document.getElementById(`score-${i}`).value) || 0;
            let winRate = parseFloat(document.getElementById(`winrate-${i}`).value) || 0;
            let style = document.getElementById(`style-${i}`).value;
            
            // 基本スコア計算 (競走得点重視 + 勝率)
            let baseScore = (rating * 0.8) + (winRate * 0.2);

            // バンクと脚質の相性補正
            if (bank === "333" && style === "逃") baseScore *= 1.1;
            if (bank === "500" && style === "追") baseScore *= 1.1;

            // ライン位置による補正を適用
            if (runnerRoles[i]) {
                baseScore *= runnerRoles[i];
            }

            scores.push({ 
                num: i, 
                name: document.getElementById(`name-${i}`).value || `選手${i}`, 
                total: baseScore 
            });
        }

        // スコア順に並び替え
        scores.sort((a, b) => b.total - a.total);

        const resultContent = document.getElementById('result-content');
        let html = "<h3>期待値ランキング</h3><ol>";
        scores.slice(0, 5).forEach((s, idx) => {
            html += `<li class="rank-${idx+1}">${s.num}番車 ${s.name} (算出スコア: ${s.total.toFixed(2)})</li>`;
        });
        html += "</ol>";

        // 簡易的な3連単フォーカス生成
        const top3 = scores.slice(0, 3).map(s => s.num);
        html += `<div style="background:#f9f9f9; padding:10px; border-radius:5px; margin-top:10px;">
                    <strong>推奨3連単:</strong> ${top3[0]} ↔ ${top3[1]} → ${top3[2]}
                 </div>`;

        resultContent.innerHTML = html;
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
