A<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アシストマジック - 9車対応・鉄壁版</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a2a6c; border-bottom: 2px solid #1a2a6c; padding-bottom: 10px; }
        .ranking-box { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .rank-value { font-size: 2em; font-weight: bold; color: #f1c40f; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #1a2a6c; color: white; }
        .car-num { font-size: 1.4em; font-weight: bold; }
        input { width: 90%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .score-cell { font-size: 1.2em; font-weight: bold; color: #e74c3c; background: #fffafa; }
    </style>
</head>
<body>
<div class="container">
    <h1>アシストマジック</h1>
    <div class="ranking-box">
        <div class="rank-item"><div>1着候補</div><div id="top1" class="rank-value">-</div></div>
        <div class="rank-item"><div>2着候補</div><div id="top2" class="rank-value">-</div></div>
        <div class="rank-item"><div>3着候補</div><div id="top3" class="rank-value">-</div></div>
    </div>
    <table>
        <thead><tr><th>車</th><th>メモ</th><th>競走得点</th><th>勝率</th><th>スコア</th></tr></thead>
        <tbody id="member-list"></tbody>
    </table>
</div>
<script>
    const tbody = document.getElementById('member-list');
    // 1〜9車までを生成
    for (let i = 1; i <= 9; i++) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="car-num">${i}</td><td><input type="text"></td><td><input type="number" step="0.01" id="point-${i}" oninput="updateAll()"></td><td><input type="number" id="win-${i}" oninput="updateAll()"></td><td id="score-${i}" class="score-cell">0.00</td>`;
        tbody.appendChild(tr);
    }

    document.addEventListener('paste', (e) => {
        e.preventDefault();
        let text = e.clipboardData.getData('text');
        
        // yottiさんのアイデア「仮想の壁」を設置
        text += " 999.99";

        const matches = text.match(/\d+\.\d+|\d+/g);
        if (!matches) return;

        // 小数点（得点）の位置をすべて特定
        let pointsPos = [];
        for (let i = 0; i < matches.length; i++) {
            if (matches[i].includes('.')) pointsPos.push(i);
        }

        pointsPos.forEach((pos, index) => {
            const pIdx = index + 1;
            // 9車分まで、かつ仮想壁に当たったら停止
            if (pIdx > 9 || matches[pos] === "999.99") return;
            
            // 1. 得点をセット
            document.getElementById(`point-${pIdx}`).value = parseFloat(matches[pos]).toFixed(2);

            // 2. 勝率を特定（絶対位置ルール）
            // 競輪jpの表構造：得点(小数)から4つ後の数字が必ず「勝率」
            // 後ろから数えるリスクを排除し、前から数えて特定します。
            let winVal = matches[pos + 4];
            if (winVal && !winVal.includes('.')) {
                document.getElementById(`win-${pIdx}`).value = winVal;
            }
            
            updateScore(pIdx);
        });
        updateRanking();
    });

    function updateAll() { for(let i=1; i<=9; i++) updateScore(i); updateRanking(); }
    
    function updateScore(idx) {
        const p = parseFloat(document.getElementById(`point-${idx}`).value) || 0;
        const w = parseFloat(document.getElementById(`win-${idx}`).value) || 0;
        // yottiさん秘伝のスコア計算
        document.getElementById(`score-${idx}`).innerText = (p + (w * 0.5)).toFixed(2);
    }

    function updateRanking() {
        let res = [];
        for (let i = 1; i <= 9; i++) {
            const sc = parseFloat(document.getElementById(`score-${i}`).innerText);
            if (sc > 0) res.push({ num: i, score: sc });
        }
        // スコアの高い順に並び替え
        res.sort((a, b) => b.score - a.score);
        // 上位3名を表示
        for (let i = 1; i <= 3; i++) {
            const el = document.getElementById(`top${i}`);
            el.innerText = res[i - 1] ? res[i - 1].num + "番車" : "-";
        }
    }
</script>
</body>
</html>
